apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-app-deployment
spec:
  replicas: 3  # Number of pod replicas
  selector:
    matchLabels:
      app: user-app
  template:
    metadata:
      labels:
        app: user-app
    spec:
      containers:
        - name: user-app
          image: binod0506/kubernetes-ci-cd-pipelinev2:latest
          ports:
            - containerPort: 8081