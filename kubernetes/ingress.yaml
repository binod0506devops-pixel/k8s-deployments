apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-app-ingress
spec:
  rules:
    - host: user-app.local  # You can set a custom hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-app-service  # Make sure this matches your service name
                port:
                  number: 8081  # Ensure it matches the container port